# Deterministic PR labeling (docs/blueprint.md §5.7).
#
# Routing outcome does not fail this job — humans may merge even when routed
# to review:human. Automerge tooling should consult the label separately.
name: Router — Label PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to route (scheduler follow-up)
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: route-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  route:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve PR metadata
        id: pr_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PRN="${{ inputs.pr_number }}"
          else
            PRN="${{ github.event.pull_request.number }}"
          fi
          HEAD_SHA=$(gh pr view "${PRN}" --repo "${{ github.repository }}"             --json headRefOid -q .headRefOid)
          echo "pr_number=${PRN}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${HEAD_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          ref: ${{ steps.pr_meta.outputs.head_sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Create routing labels (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "review:codex" --repo "${{ github.repository }}" --color "0E8A16" \
            --description "Router — automated lane eligible" || true
          gh label create "review:human" --repo "${{ github.repository }}" --color "B60205" \
            --description "Router — requires human judgement" || true
          gh label create "blocked" --repo "${{ github.repository }}" --color "5319E7" \
            --description "Router — critical finding, do not merge" || true

      - name: Build PR context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          uv run scripts/build_pr_context.py
          --repo "${{ github.repository }}"
          --pr ${{ steps.pr_meta.outputs.pr_number }}
          --fork-mode auto
          --out pr.json

      - name: Route
        run: uv run scripts/route_pr.py pr.json --policy .routing-policy.json | tee route.json

      - name: Upload router artifacts
        uses: actions/upload-artifact@v5
        if: success() || failure()
        with:
          name: router-${{ steps.pr_meta.outputs.pr_number }}
          path: |
            pr.json
            route.json

      - name: Apply label + explain (same-repo branches)
        if: >-
          github.event_name == 'workflow_dispatch' ||
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRN="${{ steps.pr_meta.outputs.pr_number }}"
          LABEL=$(jq -r '.route' route.json)
          REASONS=$(jq -r '.reasons[] | "- \(.)"' route.json)
          {
            echo "Router decision: \`${LABEL}\`";
            echo "";
            echo "Reasons:";
            echo "${REASONS}";
          } > comment.md
          for L in review:codex review:human blocked; do
            gh pr edit "${PRN}" --repo "${{ github.repository }}" --remove-label "$L" \
              >/dev/null 2>&1 || true
          done
          gh pr edit "${PRN}" --repo "${{ github.repository }}" --add-label "${LABEL}"
          gh pr comment "${PRN}" --repo "${{ github.repository }}" --body-file comment.md

      - name: Fork-head note (label mutation skipped)
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRN="${{ steps.pr_meta.outputs.pr_number }}"
          LABEL=$(jq -r '.route' route.json)
          REASONS=$(jq -r '.reasons[] | "- \(.)"' route.json)
          {
            echo "Fork-head PR: router recommends \`${LABEL}\` — apply labels manually if your org requires it.";
            echo "";
            echo "Reasons:";
            echo "${REASONS}";
          } > fork-comment.md
          gh pr comment "${PRN}" --repo "${{ github.repository }}" --body-file fork-comment.md
