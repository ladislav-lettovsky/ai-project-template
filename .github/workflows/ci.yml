# Canonical CI workflow for projects forked from ai-project-template.
#
# Design principle: CI is a thin wrapper that runs `just check` — same command
# as local dev. No rule duplication. If you add a quality gate to justfile,
# CI picks it up for free.
#
# Single-job structure by default:
#   - check : full local quality gate (pre-commit hooks + ty + unit tests)
#             runs on every push/PR, no secrets required
#
# If your project adds integration tests gated on API keys, add a second
# `integration` job per the pattern documented in docs/post-fork-checklist.md.

name: CI — Quality Checks

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag ref to run checks on (scheduler follow-up)
        required: true
        type: string

jobs:
  check:
    name: Lint, type-check, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_dispatch' &&
              inputs.ref || ''
            }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.51.0"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run full quality check (just check)
        env:
          # Skip the local-only `no-commit-to-branch` guard in CI.
          # That hook protects devs from committing to `main` directly;
          # in CI we ARE on `main` (post-merge push), and the hook would
          # otherwise fail every push-to-main run. Ruff, ty, and the stock
          # hygiene hooks still run.
          SKIP: no-commit-to-branch
        run: just check
