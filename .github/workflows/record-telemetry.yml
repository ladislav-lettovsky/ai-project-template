# Append routing telemetry when a PR merges to main.
#
# Telemetry commits land via a short-lived PR (not a direct push to main) so
# branch protection required checks stay satisfied. Skip recording when the
# merged PR is itself a telemetry chore PR to avoid loops.
name: Telemetry — Record merged PR

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: record-telemetry
  cancel-in-progress: false

jobs:
  record:
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'chore(telemetry):')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Sync main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build PR context and route
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRN="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          uv run scripts/build_pr_context.py \
            --repo "${REPO}" \
            --pr "${PRN}" \
            --fork-mode no \
            --out pr.json
          uv run scripts/route_pr.py pr.json --policy .routing-policy.json | tee route.json

      - name: Resolve CI outcome
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRN="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          CHECK_STATE=$(gh pr checks "${PRN}" --repo "${REPO}" \
            --json name,state \
            --jq '[.[] | select(.name=="Lint, type-check, unit tests")][0].state // "UNKNOWN"')
          case "${CHECK_STATE}" in
            SUCCESS) OUTCOME=success ;;
            FAILURE) OUTCOME=failure ;;
            *) OUTCOME=unknown ;;
          esac
          echo "outcome=${OUTCOME}" >> "${GITHUB_OUTPUT}"

      - name: Append telemetry event
        run: |
          uv run scripts/append_event.py \
            --pr pr.json \
            --route route.json \
            --pr-number "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.merge_commit_sha }}" \
            --ci-outcome "${{ steps.ci.outputs.outcome }}" \
            --merge-outcome merged

      - name: Regenerate dashboard
        run: uv run scripts/telemetry_dashboard.py

      - name: Open telemetry PR
        id: telemetry_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PRN="${SOURCE_PR}"
          BRANCH="chore/telemetry/pr-${PRN}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/telemetry/events.jsonl docs/telemetry/dashboard.md

          if git diff --staged --quiet; then
            echo "No telemetry changes to commit."
            echo "opened=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git checkout -b "${BRANCH}"
          git commit -m "chore(telemetry): record PR #${PRN} routing event"
          git push -u origin "${BRANCH}"

          EXISTING=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty')
          if [ -n "${EXISTING}" ]; then
            echo "Telemetry PR already open: #${EXISTING}"
            echo "number=${EXISTING}" >> "${GITHUB_OUTPUT}"
            echo "opened=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          uv run python - <<'PY'
          import os
          from pathlib import Path

          prn = os.environ["SOURCE_PR"]
          Path("telemetry-pr-body.md").write_text(
              f"""## Summary

          Automated routing telemetry for merged PR #{prn}. Only `docs/telemetry/**` files change.

          ## Test plan

          - [ ] CI — Quality Checks green
          - [ ] Router — Label PR applied (expected `review:human` for telemetry-only PRs)

          <!-- REVIEWER_JSON -->
          {{
            "summary": "Telemetry-only PR; Reviewer not required.",
            "findings": [],
            "coverage": {{
              "requirements_total": 0,
              "requirements_covered": 0,
              "tests_expected": 0,
              "tests_present": 0
            }},
            "risk_assessment": {{
              "scope_fit": "correct",
              "invariant_risk": "low",
              "production_risk": "none"
            }},
            "confidence": 100
          }}
          <!-- /REVIEWER_JSON -->

          telemetry-automerge: true
          """
          )
          PY

          TELEMETRY_PR=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(telemetry): record PR #${PRN} routing event" \
            --body-file telemetry-pr-body.md | tail -1 | grep -oE '[0-9]+$')

          echo "number=${TELEMETRY_PR}" >> "${GITHUB_OUTPUT}"
          echo "opened=true" >> "${GITHUB_OUTPUT}"

      - name: Enable auto-merge
        if: steps.telemetry_pr.outputs.opened == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEMETRY_PR: ${{ steps.telemetry_pr.outputs.number }}
        run: |
          set -euo pipefail
          if gh pr merge "${TELEMETRY_PR}" --auto --squash --delete-branch; then
            echo "Auto-merge queued for telemetry PR #${TELEMETRY_PR}."
          else
            echo "::notice title=Telemetry PR needs merge::" \
              "Could not enable auto-merge for PR #${TELEMETRY_PR}. " \
              "Enable repository auto-merge and allow GitHub Actions to create and approve pull requests, " \
              "or merge the telemetry PR manually after CI is green."
            exit 0
          fi

      - name: Wait for telemetry PR merge
        if: steps.telemetry_pr.outputs.opened == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEMETRY_PR: ${{ steps.telemetry_pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr view "${TELEMETRY_PR}" --json state --jq .state | grep -qx MERGED && exit 0
          gh pr view "${TELEMETRY_PR}" --watch --exit-status
