# Append routing telemetry on merge to main when a PR merges to main.
name: Telemetry — Record merged PR

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  record:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build PR context and route
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRN="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          uv run scripts/build_pr_context.py \
            --repo "${REPO}" \
            --pr "${PRN}" \
            --fork-mode no \
            --out pr.json
          uv run scripts/route_pr.py pr.json --policy .routing-policy.json | tee route.json

      - name: Resolve CI outcome
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRN="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          CHECK_STATE=$(gh pr checks "${PRN}" --repo "${REPO}" \
            --json name,state \
            --jq '[.[] | select(.name=="Lint, type-check, unit tests")][0].state // "UNKNOWN"')
          case "${CHECK_STATE}" in
            SUCCESS) OUTCOME=success ;;
            FAILURE) OUTCOME=failure ;;
            *) OUTCOME=unknown ;;
          esac
          echo "outcome=${OUTCOME}" >> "${GITHUB_OUTPUT}"

      - name: Append telemetry event
        run: |
          uv run scripts/append_event.py \
            --pr pr.json \
            --route route.json \
            --pr-number "${{ github.event.pull_request.number }}" \
            --head-sha "${{ github.event.pull_request.merge_commit_sha }}" \
            --ci-outcome "${{ steps.ci.outputs.outcome }}" \
            --merge-outcome merged

      - name: Regenerate dashboard
        run: uv run scripts/telemetry_dashboard.py

      - name: Commit telemetry to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/telemetry/events.jsonl docs/telemetry/dashboard.md
          if git diff --staged --quiet; then
            echo "No telemetry changes to commit."
            exit 0
          fi
          git commit -m "chore(telemetry): record PR #${{ github.event.pull_request.number }} routing event"
          git push
