# Queue and dispatch T0+low drafted specs (docs/archive/template-specs/scheduled-executor.md).
# v1: open PR via scripts/dispatch_spec.py
# 6.1: optional codex_agents job when OPENAI_API_KEY is configured
name: Scheduled Executor

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: scheduled-executor
  cancel-in-progress: false

jobs:
  scheduler_dispatch_token_probe:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    outputs:
      has_scheduler_pat: ${{ steps.probe.outputs.has_scheduler_pat }}
    steps:
      - id: probe
        env:
          SCHEDULER_DISPATCH_TOKEN: ${{ secrets.SCHEDULER_DISPATCH_TOKEN }}
        run: |
          if [ -n "${SCHEDULER_DISPATCH_TOKEN}" ]; then
            export GH_TOKEN="${SCHEDULER_DISPATCH_TOKEN}"
            if gh api user -q .login >/dev/null 2>&1; then
              echo "has_scheduler_pat=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "::warning::SCHEDULER_DISPATCH_TOKEN is set but GitHub rejected it."               "Regenerate the PAT or remove the secret." >&2
          fi
          echo "has_scheduler_pat=false" >> "${GITHUB_OUTPUT}"

  dispatch:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      pr_url: ${{ steps.dispatch.outputs.pr_url }}
      branch: ${{ steps.dispatch.outputs.branch }}
      spec_path: ${{ steps.queue.outputs.spec_path }}
      codex_enabled: ${{ steps.codex_gate.outputs.enabled }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Detect Codex CI availability
        id: codex_gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Fetch origin for branch inspection
        run: git fetch origin main

      - name: Ensure scheduler labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ensure_label() {
            local name="$1"
            local color="$2"
            local desc="$3"
            if gh label list --repo "${{ github.repository }}" --json name \
              --jq ".[] | select(.name==\"${name}\") | .name" | grep -qx "${name}"; then
              :
            else
              gh label create "${name}" --repo "${{ github.repository }}" \
                --color "${color}" --description "${desc}"
            fi
          }
          ensure_label scheduler-queue 0E8A16 "Queued spec dispatch (legacy issue transport)"
          ensure_label scheduler-failure B60205 "Scheduled executor workflow failure"

      - name: Discover queue
        id: queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run scripts/queue_specs.py \
            --remote origin \
            --repo "${{ github.repository }}" \
            --json > queue.json
          QUEUE_SIZE=$(jq 'length' queue.json)
          ELIGIBLE_COUNT=$(jq '[.[] | select(.eligible == true)] | length' queue.json)
          SPEC_PATH=$(jq -r '[.[] | select(.eligible == true)] | sort_by((.path | contains("_drills/") | not), .path) | .[0].path // empty' queue.json)
          SPEC_SLUG=$(jq -r '[.[] | select(.eligible == true)] | sort_by((.path | contains("_drills/") | not), .path) | .[0].slug // empty' queue.json)
          echo "queue_size=${QUEUE_SIZE}" >> "${GITHUB_OUTPUT}"
          echo "eligible_count=${ELIGIBLE_COUNT}" >> "${GITHUB_OUTPUT}"
          echo "spec_path=${SPEC_PATH}" >> "${GITHUB_OUTPUT}"
          echo "spec_slug=${SPEC_SLUG}" >> "${GITHUB_OUTPUT}"

      - name: Workflow summary
        run: |
          {
            echo "## Scheduled executor"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Queue size | ${{ steps.queue.outputs.queue_size }} |"
            echo "| Eligible | ${{ steps.queue.outputs.eligible_count }} |"
            if [ -n "${{ steps.queue.outputs.spec_path }}" ]; then
              echo "| Selected spec | \`${{ steps.queue.outputs.spec_path }}\` |"
            else
              echo "| Selected spec | none |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Dispatch selected spec
        if: steps.queue.outputs.spec_path != ''
        id: dispatch
        env:
          SCHEDULER_DISPATCH_TOKEN: ${{ secrets.SCHEDULER_DISPATCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${SCHEDULER_DISPATCH_TOKEN}" ]             && GH_TOKEN="${SCHEDULER_DISPATCH_TOKEN}" gh api user -q .login             >/dev/null 2>&1; then
            export GH_TOKEN="${SCHEDULER_DISPATCH_TOKEN}"
          else
            if [ -n "${SCHEDULER_DISPATCH_TOKEN}" ]; then
              echo "::warning::SCHEDULER_DISPATCH_TOKEN auth failed; using GITHUB_TOKEN." >&2
            fi
            export GH_TOKEN="${GITHUB_TOKEN}"
          fi
          TRANSPORT=pr
          if [ -n "${OPENAI_API_KEY}" ]; then
            TRANSPORT=codex
          fi
          uv run scripts/dispatch_spec.py \
            --spec "${{ steps.queue.outputs.spec_path }}" \
            --repo "${{ github.repository }}" \
            --transport "${TRANSPORT}" \
            --json-out dispatch.json
          PR_URL=$(jq -r '.pr_url // empty' dispatch.json)
          BRANCH=$(jq -r '.branch // empty' dispatch.json)
          echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"
          {
            echo ""
            echo "### Dispatch outcome"
            echo ""
            echo "- Branch: \`${BRANCH}\`"
            echo "- Transport: \`${TRANSPORT}\`"
            if [ -n "${PR_URL}" ]; then
              echo "- Pull request: ${PR_URL}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "scheduler-failure: workflow run ${{ github.run_id }}" \
            --label scheduler-failure \
            --body "$(cat <<EOFBODY
          Scheduled executor workflow failed.

          - Workflow run: ${RUN_URL}
          - Event: ${{ github.event_name }}
          - Ref: ${{ github.ref }}

          Inspect the failing step log in the run linked above.
          EOFBODY
          )"

  codex_executor:
    needs: dispatch
    if: >-
      needs.dispatch.outputs.pr_url != '' &&
      needs.dispatch.outputs.codex_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.dispatch.outputs.branch }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Write executor prompt
        run: |
          mkdir -p .scratch
          uv run scripts/codex_ci.py write-prompt \
            --role executor \
            --spec "${{ needs.dispatch.outputs.spec_path }}" \
            --output .scratch/codex-executor-prompt.md

      - name: Run Executor (Codex)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .scratch/codex-executor-prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-home: ${{ runner.temp }}/codex-executor
          output-file: .scratch/codex-executor-output.md

      - name: Commit Executor changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No Executor changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "feat: implement ${{ needs.dispatch.outputs.spec_path }} (scheduled Codex)"
          git push origin HEAD

  codex_reviewer:
    needs: [dispatch, codex_executor]
    if: >-
      needs.dispatch.outputs.pr_url != '' &&
      needs.dispatch.outputs.codex_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.dispatch.outputs.branch }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Write reviewer prompt
        run: |
          mkdir -p .scratch
          uv run scripts/codex_ci.py write-prompt \
            --role reviewer \
            --spec "${{ needs.dispatch.outputs.spec_path }}" \
            --output .scratch/codex-reviewer-prompt.md

      - name: Run Reviewer (Codex)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .scratch/codex-reviewer-prompt.md
          sandbox: read-only
          safety-strategy: drop-sudo
          codex-home: ${{ runner.temp }}/codex-reviewer
          output-file: .scratch/codex-reviewer-output.md

      - name: Extract and apply Reviewer JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          PR_NUMBER=$(uv run python -c "from scripts.codex_ci import parse_pr_number; print(parse_pr_number('${{ needs.dispatch.outputs.pr_url }}'))")
          uv run python -c "
          import json
          from pathlib import Path
          from scripts import codex_ci
          text = Path('.scratch/codex-reviewer-output.md').read_text(encoding='utf-8')
          reviewer = codex_ci.extract_reviewer_json_block(text)
          Path('.scratch/reviewer.json').write_text(json.dumps(reviewer, indent=2), encoding='utf-8')
          "
          uv run scripts/codex_ci.py apply-reviewer \
            --pr "${PR_NUMBER}" \
            --reviewer-json .scratch/reviewer.json \
            --repo "${{ github.repository }}"
          gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" \
            --json body -q .body > .scratch/pr-body.md
          uv run scripts/validate_reviewer.py .scratch/pr-body.md

      - name: Optional auto-merge
        if: vars.SCHEDULER_AUTO_MERGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(uv run python -c "from scripts.codex_ci import parse_pr_number; print(parse_pr_number('${{ needs.dispatch.outputs.pr_url }}'))")
          uv run scripts/try_auto_merge.py --pr "${PR_NUMBER}" --repo "${{ github.repository }}"

  # PR opened may fire route-pr on the dispatch stub (confidence 0). After Codex,
  # refresh CI + route on the PR branch so required checks attach to headRefOid
  # (merge box). workflow_dispatch --ref main records checks on main, not the PR.
  trigger_pr_checks:
    needs: [dispatch, codex_reviewer, scheduler_dispatch_token_probe]
    if: >-
      needs.dispatch.result == 'success' &&
      needs.dispatch.outputs.pr_url != '' &&
      (needs.codex_reviewer.result == 'success' ||
      needs.codex_reviewer.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Refresh PR checks on branch head
        env:
          SCHEDULER_DISPATCH_TOKEN: ${{ secrets.SCHEDULER_DISPATCH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_SCHEDULER_PAT: ${{ needs.scheduler_dispatch_token_probe.outputs.has_scheduler_pat }}
          PR_URL: ${{ needs.dispatch.outputs.pr_url }}
          BRANCH: ${{ needs.dispatch.outputs.branch }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          PR_NUMBER="${PR_URL##*/}"

          if [ "${HAS_SCHEDULER_PAT}" = "true" ]; then
            export GH_TOKEN="${SCHEDULER_DISPATCH_TOKEN}"
          else
            export GH_TOKEN="${GITHUB_TOKEN}"
          fi

          git fetch origin main "${BRANCH}"
          for wf in ci.yml route-pr.yml; do
            if ! git diff --quiet "origin/main:.github/workflows/${wf}" "origin/${BRANCH}:.github/workflows/${wf}"; then
              echo "::error::${BRANCH} modified .github/workflows/${wf}; refusing branch dispatch for merge checks" >&2
              exit 1
            fi
          done

          latest_run_id() {
            local workflow_file="$1"
            local branch="${2:-}"
            local event="${3:-}"
            local run_args=(--workflow="${workflow_file}" --repo "${REPO}" --limit 1 --json databaseId)
            if [ -n "${branch}" ]; then
              run_args+=(--branch="${branch}")
            fi
            if [ -n "${event}" ]; then
              run_args+=(--event "${event}")
            fi
            gh run list "${run_args[@]}" -q '.[0].databaseId // empty'
          }

          wait_for_new_run() {
            local workflow_file="$1"
            local branch="${2:-}"
            local event="${3:-}"
            local before="$4"
            local run_id=""
            for _ in $(seq 1 24); do
              run_id=$(latest_run_id "${workflow_file}" "${branch}" "${event}")
              if [ -n "${run_id}" ] && [ "${run_id}" != "${before}" ]; then
                printf '%s' "${run_id}"
                return 0
              fi
              sleep 5
            done
            echo "Timed out waiting for ${workflow_file} run to start" >&2
            return 1
          }

          require_check_success() {
            local check_name="$1"
            local commit_sha="$2"
            local conclusion
            conclusion=$(gh api "repos/${REPO}/commits/${commit_sha}/check-runs"               --jq "([.check_runs[] | select(.name == \"${check_name}\") | .conclusion][0] // \"\")")
            if [ "${conclusion}" != "success" ]; then
              echo "Check ${check_name} missing or not success on ${commit_sha} (got: ${conclusion:-none})" >&2
              gh api "repos/${REPO}/commits/${commit_sha}/check-runs"                 --jq '[.check_runs[] | {name, status, conclusion}]' >&2
              exit 1
            fi
          }

          ROUTE_BEFORE=$(latest_run_id route-pr.yml "${BRANCH}" workflow_dispatch)
          gh workflow run route-pr.yml --ref "${BRANCH}"               -f "pr_number=${PR_NUMBER}" --repo "${REPO}"
          ROUTE_RUN=$(wait_for_new_run route-pr.yml "${BRANCH}" workflow_dispatch "${ROUTE_BEFORE}")
          gh run watch "${ROUTE_RUN}" --repo "${REPO}" --exit-status

          CI_BEFORE=$(latest_run_id ci.yml "${BRANCH}" workflow_dispatch)
          gh workflow run ci.yml --ref "${BRANCH}" -f "ref=${BRANCH}" --repo "${REPO}"
          CI_RUN=$(wait_for_new_run ci.yml "${BRANCH}" workflow_dispatch "${CI_BEFORE}")
          gh run watch "${CI_RUN}" --repo "${REPO}" --exit-status

          HEAD_SHA=$(gh pr view "${PR_NUMBER}" --repo "${REPO}"             --json headRefOid --jq .headRefOid)
          require_check_success "Lint, type-check, unit tests" "${HEAD_SHA}"
          require_check_success "route" "${HEAD_SHA}"
